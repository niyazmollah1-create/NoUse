name: Unzip and Push MCPanel

on:
  workflow_dispatch:
  push:
    paths:
      - "mcpanelv1.zip"

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip mcpanelv1.zip
        run: |
          unzip -o mcpanelv1.zip -d .

      - name: Delete zip file
        run: |
          rm -f mcpanelv1.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "Auto unzip mcpanelv1.zip and remove zip" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
