name: Fix Panel Folder

on:
  workflow_dispatch:

jobs:
  fix-panel:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy panel contents to root
        run: |
          if [ -d "panel" ]; then
            shopt -s dotglob
            cp -r panel/* .
          fi

      - name: Remove panel completely
        run: |
          git rm -f panel || true
          rm -rf .git/modules/panel || true
          rm -rf panel || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Remove panel submodule and move files to root" || echo "No changes"

          git push
