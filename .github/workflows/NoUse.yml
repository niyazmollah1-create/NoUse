name: Extract MCPanel Zip

on:
  workflow_dispatch:
  push:
    paths:
      - "mcpanelv1.zip"

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old panel stuff
        run: |
          rm -rf panel
          rm -rf .git/modules/panel
          git rm -f panel || true

      - name: Extract zip into root
        run: |
          unzip -o mcpanelv1.zip

      - name: Delete zip
        run: |
          rm -f mcpanelv1.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Extract mcpanelv1.zip and remove panel" || echo "No changes"

          git push
