name: Extract MCPanel Zip

on:
  workflow_dispatch:
  push:
    paths:
      - "mcpanelv1.zip"

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force replace repo with zip contents
        run: |
          mkdir temp_extract

          unzip -o mcpanelv1.zip -d temp_extract

          shopt -s dotglob

          # Remove everything except .git and workflow files
          find . -mindepth 1 \
            ! -path "./.git*" \
            ! -path "./.github*" \
            -exec rm -rf {} +

          inner=$(find temp_extract -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -n "$inner" ]; then
            mv "$inner"/* .
          else
            mv temp_extract/* .
          fi

          rm -rf temp_extract
          rm -f mcpanelv1.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Replace repo with mcpanelv1 contents" || echo "No changes"

          git push
