name: Extract Panel Folder

on:
  workflow_dispatch:
  push:
    paths:
      - "panel/**"

jobs:
  extract-panel:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move panel contents to repo root
        run: |
          shopt -s dotglob

          mv panel/* .

          rm -rf panel

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Move panel contents to root and delete panel folder" || echo "No changes"

          git push
