name: Extract MCPanel Zip (Fixed)

on:
  workflow_dispatch:
  push:
    paths:
      - "mcpanelv1.zip"

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract zip
        run: |
          rm -rf temp_extract
          mkdir temp_extract

          unzip -o mcpanelv1.zip -d temp_extract

      - name: Remove nested git repo (important)
        run: |
          find temp_extract -name ".git" -type d -exec rm -rf {} +

      - name: Flatten panel folder into root
        run: |
          shopt -s dotglob

          if [ -d "temp_extract/panel" ]; then
            mv temp_extract/panel/* .
          else
            mv temp_extract/* .
          fi

          rm -rf temp_extract

      - name: Delete zip
        run: |
          rm -f mcpanelv1.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Properly extract MCPanel zip (no nested git)" || echo "No changes"
          git push
